title: Mimikatz Command Line Usage
id: e4a6b1f0-5b8b-4c2a-9c3d-1a2b3c4d5e6f
status: test
description: >
  Detects mimikatz command-line usage. High severity - direct
  credential-dumping tooling has no legitimate business use and indicates
  active compromise.
references:
  - https://github.com/gentilkiwi/mimikatz
  - https://attack.mitre.org/software/S0002/
tags:
  - attack.credential-access
  - attack.t1003.001
author: detection-engineering
date: 2026-01-01
level: high
falsepositives:
  - None identified during testing
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'sekurlsa::'
      - 'privilege::debug'
  condition: selection
# test case: CommandLine="mimikatz.exe privilege::debug sekurlsa::logonpasswords exit"
#            fires on the selection condition above; verified against a
#            synthetic process_creation event.
